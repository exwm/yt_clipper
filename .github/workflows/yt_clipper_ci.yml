name: yt_clipper

on:
  push:
    branches:
      - release
      - release/*
      - test-ci

env:
  NAME: yt_clipper
  VERSION: "5.42.0"

  FFMPEG_VERSION: "8.0.1"
  FFMPEG_WIN_BASE_URL: https://github.com/GyanD/codexffmpeg/releases/download
  FFMPEG_MAC_BASE_URL: https://evermeet.cx/ffmpeg

  YTDLP_VERSION: "2026.03.17"
  YTDLP_BASE_URL: https://github.com/yt-dlp/yt-dlp/releases/download

  DENO_VERSION: "2.5.6"
  DENO_BASE_URL: https://github.com/denoland/deno/releases/download

  VIDEO2X_VERSION: "6.5.0-exwm"
  VIDEO2X_BASE_URL: https://github.com/exwm/video2x/releases/download

jobs:
  build:
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 4
      matrix:
        node-version: ["22.18.x"]
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            shortos: win
            yt-dlp_filename: yt-dlp.exe
            deno_filename: deno-x86_64-pc-windows-msvc.zip
          - os: macos-latest
            shortos: macos
            yt-dlp_filename: yt-dlp_macos
            deno_filename: deno-aarch64-apple-darwin.zip

    steps:
      - name: Set env
        shell: bash
        run: |
          echo "FULL_NAME=${{env.NAME}}_${{matrix.shortos}}_${{env.VERSION}}" >> $GITHUB_ENV
          echo "NOPLAT_NAME=${{env.NAME}}_${{env.VERSION}}" >> $GITHUB_ENV
          echo "FULL_NAME_WIN_FULL=${{env.NAME}}_win_${{env.VERSION}}_full" >> $GITHUB_ENV
          echo "YTDLP_DL_URL=${{ env.YTDLP_BASE_URL }}/${{ env.YTDLP_VERSION }}/${{ matrix.yt-dlp_filename }}" >> $GITHUB_ENV
          echo "DENO_DL_URL=${{ env.DENO_BASE_URL }}/v${{ env.DENO_VERSION }}/${{ matrix.deno_filename }}" >> $GITHUB_ENV

      - name: Set env (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "FFMPEG_DL_NAME=ffmpeg-${{ env.FFMPEG_VERSION }}-full_build-shared" >> $GITHUB_ENV
          echo "FFMPEG_DL_PREFIX=${{ env.FFMPEG_WIN_BASE_URL }}/${{ env.FFMPEG_VERSION }}" >> $GITHUB_ENV
          echo "VIDEO2X_DL_URL=${{ env.VIDEO2X_BASE_URL }}/v${{ env.VIDEO2X_VERSION }}/video2x-windows-amd64.zip" >> $GITHUB_ENV

      - name: Set env (macos)
        if: matrix.shortos == 'macos'
        shell: bash
        run: |
          echo "FFMPEG_DL_URL=${{ env.FFMPEG_MAC_BASE_URL }}/ffmpeg-${{ env.FFMPEG_VERSION }}.7z" >> $GITHUB_ENV
          echo "FFPROBE_DL_URL=${{ env.FFMPEG_MAC_BASE_URL }}/ffprobe-${{ env.FFMPEG_VERSION }}.7z" >> $GITHUB_ENV
          echo "FFPLAY_DL_URL=${{ env.FFMPEG_MAC_BASE_URL }}/ffplay-${{ env.FFMPEG_VERSION }}.7z" >> $GITHUB_ENV
          echo "FFMPEG_INFO_URL=${{ env.FFMPEG_MAC_BASE_URL }}/info/${{ env.FFMPEG_VERSION }}" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up dirs
        shell: bash
        run: |
          mkdir -p ./artifact/py/${{env.FULL_NAME}}/{webms,bin,temp}/
          mkdir -p ./bindeps

      - name: Download ffmpeg dependency (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd ./bindeps
          curl -o ./ffmpeg.zip -L $FFMPEG_DL_PREFIX/$FFMPEG_DL_NAME.7z
          7z x ./ffmpeg.zip
          mv ./$FFMPEG_DL_NAME ffmpeg

          ./ffmpeg/bin/ffmpeg -version > version.txt
          mv version.txt ffmpeg

          ls -laR

      - name: Download ffmpeg dependency (macos)
        if: matrix.shortos == 'macos'
        shell: bash
        run: |
          cd ./bindeps
          mkdir temp
          cd temp

          curl -o ./ffmpeg.7z  -L $FFMPEG_DL_URL
          curl -o ./ffprobe.7z -L $FFPROBE_DL_URL
          curl -o ./ffplay.7z  -L $FFPLAY_DL_URL
          curl -o version.txt  -L $FFMPEG_INFO_URL

          7z x ./ffmpeg.7z
          7z x ./ffprobe.7z
          7z x ./ffplay.7z

          cd ..

          mkdir -p ffmpeg/bin

          mv temp/ffmpeg temp/ffprobe temp/ffplay ffmpeg/bin
          chmod -v +x ffmpeg/bin/*
          mv temp/version.txt ffmpeg

          ls -laR

      - name: Download yt-dlp dependency
        shell: bash
        run: |
          cd ./bindeps
          mkdir -p yt-dlp/bin
          cd yt-dlp/bin
          curl -O -L $YTDLP_DL_URL

          chmod -v +x *

          ls -laR

      - name: Download deno dependency
        shell: bash
        run: |
          cd ./bindeps
          mkdir -p deno/bin
          cd deno/bin

          curl -o ./deno.zip -L $DENO_DL_URL
          7z x ./deno.zip
          rm -f ./deno.zip

          chmod -v +x *

          ls -laR

      - name: Download video2x dependency (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd ./bindeps
          mkdir -p video2x
          curl -o ./video2x.zip -L $VIDEO2X_DL_URL
          7z x ./video2x.zip -o./video2x
          rm -f ./video2x.zip
          echo "${{ env.VIDEO2X_VERSION }}" > ./video2x/version.txt
          ls -laR ./video2x

      - name: Disable Windows Defender realtime scanning
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Setup just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3 (3.1.0)

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"

      - name: Load cached node_modules
        id: cached-node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: yarn-${{ matrix.os }}-${{ hashFiles('**/yarn.lock') }}
      - run: yarn install --frozen-lockfile --ignore-scripts

      - run: just bundle-prod

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.9.26"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Lint with ruff
        run: just lint-py

      - name: Run clipper tests
        run: just test-py

      - name: Generate executable
        run: just build-py

      # Done with uv
      - name: Minimize uv cache
        run: uv cache prune --ci

      - name: Copy artifacts
        shell: bash
        run: |
          mv ./bindeps/ffmpeg/bin/* ./artifact/py/${{env.FULL_NAME}}/bin/
          mv ./bindeps/ffmpeg/*.txt ./artifact/py/${{env.FULL_NAME}}/bin/
          mv ./bindeps/yt-dlp/bin/* ./artifact/py/${{env.FULL_NAME}}/bin/
          mv ./bindeps/deno/bin/* ./artifact/py/${{env.FULL_NAME}}/bin/

          cp ./src/clipper/include/* ./artifact/py/${{env.FULL_NAME}}/
          cp ./src/clipper/${{matrix.shortos}}_helpers/* ./artifact/py/${{env.FULL_NAME}}/
          mkdir -p ./artifact/py/${{env.FULL_NAME}}/yt-dlp-plugins/ytc
          cp -R ./src/clipper/yt-dlp-plugins/ytc/ ./artifact/py/${{env.FULL_NAME}}/yt-dlp-plugins/
          cp ./dist/py/yt_clipper* ./artifact/py/${{env.FULL_NAME}}/

      - name: Copy full artifacts (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p ./artifact/py/${{env.FULL_NAME_WIN_FULL}}/
          cp -r ./artifact/py/${{env.FULL_NAME}}/* ./artifact/py/${{env.FULL_NAME_WIN_FULL}}/
          mkdir -p ./artifact/py/${{env.FULL_NAME_WIN_FULL}}/bin/video2x
          cp -r ./bindeps/video2x/* ./artifact/py/${{env.FULL_NAME_WIN_FULL}}/bin/video2x/

      - name: Print clipper install version (windows)
        if: matrix.os == 'windows-latest'
        run: |
          ./dist/py/yt_clipper.exe --version

      - name: Print clipper install version (non-windows)
        if: matrix.os != 'windows-latest'
        run: |
          ./dist/py/yt_clipper --version

      - name: Copy artifacts (markup)
        if: matrix.shortos == 'macos'
        shell: bash
        run: |
          mkdir -p ./artifact/js/
          cp ./dist/js/yt_clipper.js ./artifact/js/${{env.NOPLAT_NAME}}.js

      - name: Zip artifacts on windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          7z a ./artifact/py/${{env.FULL_NAME}}.zip ./artifact/py/${{env.FULL_NAME}}/
          7z a ./artifact/py/${{env.FULL_NAME_WIN_FULL}}.zip ./artifact/py/${{env.FULL_NAME_WIN_FULL}}/

      - name: Zip artifacts on non-windows systems
        if: matrix.os != 'windows-latest'
        run: |
          cd ./artifact/py
          zip -r ${{env.FULL_NAME}}.zip ./${{env.FULL_NAME}}/

      - name: Upload clipper script installation artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.FULL_NAME}}.zip
          path: ./artifact/py/${{env.FULL_NAME}}.zip

      - name: Upload full clipper script installation artifact (windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.FULL_NAME_WIN_FULL}}.zip
          path: ./artifact/py/${{env.FULL_NAME_WIN_FULL}}.zip

      - name: Upload markup script installation artifact
        if: matrix.shortos == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.NOPLAT_NAME}}.js
          path: ./artifact/js/${{env.NOPLAT_NAME}}.js

  release:
    needs: build
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Set env
        run: |
          echo "DATE=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "FULL_NAME=${{env.NAME}}_${{env.VERSION}}" >> $GITHUB_ENV
          echo "FULL_NAME_WIN=${{env.NAME}}_win_${{env.VERSION}}" >> $GITHUB_ENV
          echo "FULL_NAME_MAC=${{env.NAME}}_macos_${{env.VERSION}}" >> $GITHUB_ENV
          echo "FULL_NAME_WIN_FULL=${{env.NAME}}_win_${{env.VERSION}}_full" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4
        with:
          name: ${{env.FULL_NAME_WIN}}.zip

      - uses: actions/download-artifact@v4
        with:
          name: ${{env.FULL_NAME_WIN_FULL}}.zip

      - uses: actions/download-artifact@v4
        with:
          name: ${{env.FULL_NAME_MAC}}.zip

      - uses: actions/download-artifact@v4
        with:
          name: ${{env.FULL_NAME}}.js

      - name: Create release and upload assets
        run: |
          gh release create v${{env.VERSION}} \
            --repo ${{github.repository}} \
            --title "${{env.NAME}} v${{env.VERSION}} [${{env.DATE}}]" \
            --draft \
            ${{env.FULL_NAME_WIN}}.zip \
            ${{env.FULL_NAME_WIN_FULL}}.zip \
            ${{env.FULL_NAME_MAC}}.zip \
            ${{env.FULL_NAME}}.js
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
